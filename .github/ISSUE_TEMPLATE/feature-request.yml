name: Feature Request | 功能建議
description: Suggest a new feature or improvement | 建議新功能或改進
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem | 問題描述
      description: What problem does this feature solve? | 這個功能解決什麼問題？
      placeholder: |
        A clear description of the problem.
        清楚描述您遇到的問題。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution | 建議的解決方案
      description: How would you like this to work? | 您希望這個功能如何運作？
      placeholder: |
        Describe your ideal solution.
        描述您理想中的解決方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered | 考慮過的替代方案
      description: Any alternative solutions you've considered | 您考慮過的其他替代方案
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context | 補充資訊
      description: Any other context, screenshots, or references | 其他相關資訊、截圖或參考資料
    validations:
      required: false
